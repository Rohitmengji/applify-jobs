<form id="new_applicant" action="https://acme.applytojob.com/apply/abc">
  <label for="f">First Name</label>
  <input id="f" name="first_name" type="text" />
  <label for="l">Last Name</label>
  <input id="l" name="last_name" type="text" />
  <label for="e">Email</label>
  <input id="e" name="email" type="email" />
  <label for="p">Phone</label>
  <input id="p" name="phone" type="tel" />
  <label for="c">City</label>
  <input id="c" name="city" type="text" />
  <label for="r">Resume</label>
  <input id="r" name="resume" type="file" />
</form>
