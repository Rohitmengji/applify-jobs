<div data-automation-id="applyFlow">
  <!-- Plain labelled inputs (mapped by data-automation-id) -->
  <label for="fn">First Name</label>
  <input id="fn" data-automation-id="legalNameSection_firstName" type="text" />
  <label for="ln">Last Name</label>
  <input id="ln" data-automation-id="legalNameSection_lastName" type="text" />
  <label for="em">Email</label>
  <input id="em" data-automation-id="email" type="email" />
  <label for="ph">Phone</label>
  <input id="ph" data-automation-id="phone-number" type="tel" />

  <!-- Custom "Select One" dropdown: trigger is a <button aria-haspopup=listbox> (NOT
       role=combobox), no label[for]; question text is a sibling node inside the
       formField-* group; the value span sits INSIDE the button. -->
  <div data-automation-id="formField-workAuthorization">
    <label id="q-workauth-label" class="wd-label"
      >Are you legally authorized to work in this country?<abbr title="required">*</abbr></label
    >
    <button
      type="button"
      data-automation-id="workAuthorization"
      aria-haspopup="listbox"
      aria-expanded="false"
      aria-controls="workauth-popup"
      aria-labelledby="q-workauth-label workauth-value"
    >
      <span id="workauth-value" data-automation-id="selectedItem">Select One</span>
    </button>
    <ul id="workauth-popup" role="listbox" style="display: none">
      <li role="option"><div data-automation-id="promptOption" data-automation-label="Yes">Yes</div></li>
      <li role="option"><div data-automation-id="promptOption" data-automation-label="No">No</div></li>
    </ul>
  </div>

  <!-- Questionnaire textarea: label is a sibling descendant of the wrapper (no for/aria),
       exercises the field-group climb. -->
  <div data-automation-id="formField-additionalInfo">
    <div class="wd-label">Why do you want to work here?<abbr title="required">*</abbr></div>
    <textarea data-automation-id="additionalInfo"></textarea>
  </div>

  <!-- Dropdown labelled ONLY via aria-label in Workday's "<question> select one required"
       form — exercises the aria-label suffix stripping. -->
  <div data-automation-id="formField-sponsorship">
    <button
      type="button"
      data-automation-id="sponsorshipQuestion"
      aria-haspopup="listbox"
      aria-expanded="false"
      aria-label="Will you now or in the future require sponsorship? select one required"
    >
      Select One
    </button>
  </div>

  <button data-automation-id="bottom-navigation-next-button" type="button">Save and Continue</button>
</div>
