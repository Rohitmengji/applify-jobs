<div data-ui="application-form">
  <form action="https://apply.workable.com/acme/j/ABC/apply">
    <label for="fn">First Name</label>
    <input id="fn" name="firstname" type="text" />
    <label for="ln">Last Name</label>
    <input id="ln" name="lastname" type="text" />
    <label for="em">Email</label>
    <input id="em" name="email" type="email" />
    <label for="ph">Phone</label>
    <input id="ph" name="phone" type="tel" />
    <label for="rs">Upload your resume</label>
    <input id="rs" name="resume" type="file" />
  </form>
</div>
