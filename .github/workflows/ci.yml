name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm compile # wxt prepare + tsc --noEmit
      - run: pnpm lint
      - run: pnpm format:check

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    name: Production Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Static-bundle budget
        run: |
          BUDGET=$((7 * 1024 * 1024))   # 7 MiB ceiling (current build ≈ 0.5 MiB)
          SIZE=$(du -sb .output/chrome-mv3 | cut -f1)
          echo "Static bundle: $SIZE bytes (budget $BUDGET bytes)"
          if [ "$SIZE" -gt "$BUDGET" ]; then
            echo "::error::Static bundle ($SIZE bytes) exceeds budget ($BUDGET bytes). Reduce it, or raise the budget here with justification."
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: chrome-mv3
          path: .output/chrome-mv3
          retention-days: 7

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [lint-type-check, test, build]
    if: always()
    steps:
      - name: Verify all required jobs passed
        run: |
          if [ "${{ needs.lint-type-check.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "::error::One or more required checks failed."
            exit 1
          fi
          echo "All required checks passed."
