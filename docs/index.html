<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OneClick Apply — Chrome Extension</title>
    <style>
      :root {
        --max-w: 680px;
        --fg: #1a1a2e;
        --bg: #fafbfc;
        --accent: #2563eb;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: var(--fg);
        background: var(--bg);
        line-height: 1.7;
        padding: 2rem 1.5rem;
      }
      main {
        max-width: var(--max-w);
        margin: 0 auto;
        text-align: center;
      }
      h1 {
        font-size: 1.8rem;
        margin-bottom: 0.5rem;
      }
      p {
        margin-bottom: 1rem;
      }
      a {
        color: var(--accent);
      }
      .links {
        margin-top: 2rem;
      }
      .links a {
        display: inline-block;
        margin: 0.5rem 1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>OneClick Apply</h1>
      <p>
        Fill job applications across every major ATS with one click. Local-first, human-in-the-loop.
      </p>
      <div class="links">
        <a href="privacy.html">Privacy Policy</a>
      </div>
    </main>
  </body>
</html>
